name: dons-platform
region: nyc1

services:
  - name: backend
    dockerfile_path: backend/Dockerfile
    source_dir: /backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: DIGITALOCEAN_API_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_AI_MODEL_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_AI_MODELNAME
        value: llama3-8b-instruct
      - key: SPACES_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_ACCESS_URL
        value: https://1donsspaces.nyc3.digitaloceanspaces.com
      - key: DO_SPACES_REGION
        value: nyc3
      - key: DO_SPACES_BUCKET
        value: 1donsspaces
      - key: DO_PROJECT_NAME
        value: DONS
      - key: DO_KB_ENDPOINT
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: FRONTEND_URL
        value: ${streamlit.PUBLIC_URL}
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 10

  - name: streamlit
    dockerfile_path: streamlit_app/Dockerfile
    source_dir: /streamlit_app
    http_port: 8501
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: BACKEND_URL
        value: ${backend.PRIVATE_URL}
    routes:
      - path: /

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1
