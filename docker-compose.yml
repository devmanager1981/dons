version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dons-backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./dons_local.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: dons-streamlit
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app
    depends_on:
      - backend
